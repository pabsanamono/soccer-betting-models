# =============================================================================
# Soccer Betting Modeling — main configuration
# =============================================================================
# All paths are relative to the project root unless absolute.

paths:
  data_raw: data/raw
  data_processed: data/processed
  data_external: data/external
  artifacts: artifacts

# -----------------------------------------------------------------------------
# Data collection
# -----------------------------------------------------------------------------
data:
  # football-data.co.uk provides free historical results + closing odds.
  # Division codes: E0 (Premier League), E1 (Championship), SP1 (La Liga),
  # D1 (Bundesliga), I1 (Serie A), F1 (Ligue 1), N1 (Eredivisie), etc.
  source: football_data_uk
  divisions:
    - E0
  # Season codes use the football-data convention, e.g. "2324" = 2023/24.
  seasons:
    - "2021"
    - "2122"
    - "2223"
    - "2324"
  # Optional: The Odds API for live/forward odds (requires API key in secrets).
  odds_api:
    enabled: false
    base_url: https://api.the-odds-api.com/v4
    sport: soccer_epl
    regions: eu
    markets: h2h

# -----------------------------------------------------------------------------
# Feature engineering
# -----------------------------------------------------------------------------
features:
  rolling_windows: [3, 5, 10]   # recent-form windows (matches)
  elo:
    k_factor: 20
    home_advantage: 65
    initial_rating: 1500
  include_market_features: true # use devigged market probs as features

# -----------------------------------------------------------------------------
# Statistical models
# -----------------------------------------------------------------------------
models:
  dixon_coles:
    xi: 0.0018          # time-decay rate (per day); 0 disables decay
    max_goals: 10       # truncation of the scoreline matrix
  poisson:
    max_goals: 10
  elo:
    k_factor: 20
    home_advantage: 65

# -----------------------------------------------------------------------------
# Machine learning
# -----------------------------------------------------------------------------
ml:
  target: result        # result (H/D/A) classification
  test_size: 0.2
  random_state: 42
  calibration:
    method: isotonic    # one of: sigmoid (Platt), isotonic, none
    cv: 3
  xgboost:
    n_estimators: 400
    max_depth: 4
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8

# -----------------------------------------------------------------------------
# Odds / devigging
# -----------------------------------------------------------------------------
devig:
  method: shin          # one of: multiplicative, additive, shin, power

# -----------------------------------------------------------------------------
# Backtesting & staking
# -----------------------------------------------------------------------------
backtest:
  initial_bankroll: 1000.0
  staking: fractional_kelly   # flat | kelly | fractional_kelly
  kelly_fraction: 0.25        # quarter-Kelly (field standard)
  flat_stake: 10.0
  min_edge: 0.02              # only bet when model edge exceeds this
  max_stake_fraction: 0.05    # cap any single stake at 5% of bankroll
  commission: 0.0            # exchange commission, if applicable
